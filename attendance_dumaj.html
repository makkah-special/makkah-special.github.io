<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كشف الحضور — برنامج الدمج الفكري</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #1a3a5c;
  --accent:  #c25a00;
  --accent2: #e07020;
  --bg:      #fdf8f3;
  --card:    #ffffff;
  --border:  #e8d5c0;
  --text:    #1a1a2e;
  --muted:   #7a7a9a;
  --green:   #16a34a;
  --red:     #dc2626;
  --yellow:  #d97706;
  --radius:  14px;
  --shadow:  0 4px 24px rgba(194,90,0,0.10);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Cairo',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* HEADER */
.page-header {
  background: linear-gradient(135deg, #1a3a5c 0%, #c25a00 100%);
  color:#fff; padding:18px 24px;
  display:flex; align-items:center; justify-content:space-between; gap:12px;
  flex-wrap:wrap;
}
.page-header h1 { font-size:1.2rem; font-weight:800; }
.page-header p  { font-size:0.78rem; opacity:0.85; margin-top:2px; }
.back-btn {
  background:rgba(255,255,255,0.15); color:#fff; border:1px solid rgba(255,255,255,0.3);
  padding:8px 16px; border-radius:20px; font-size:0.82rem; font-weight:700;
  text-decoration:none; transition:all 0.2s;
}
.back-btn:hover { background:rgba(255,255,255,0.25); }

/* TOOLBAR */
.toolbar {
  background:#fff; border-bottom:2px solid var(--border);
  padding:14px 20px; display:flex; gap:12px; align-items:center; flex-wrap:wrap;
  position:sticky; top:0; z-index:100; box-shadow:0 2px 12px rgba(0,0,0,0.06);
}
.toolbar-group { display:flex; align-items:center; gap:8px; }
.toolbar label { font-size:0.82rem; font-weight:700; color:var(--muted); white-space:nowrap; }
select, input[type="date"], input[type="text"] {
  border:1px solid var(--border); border-radius:8px;
  padding:7px 12px; font-family:'Cairo',sans-serif; font-size:0.84rem;
  color:var(--text); background:#fff; outline:none;
  transition: border-color 0.2s;
}
select:focus, input:focus { border-color:var(--accent); }
.btn {
  padding:8px 16px; border-radius:10px; border:none; cursor:pointer;
  font-family:'Cairo',sans-serif; font-size:0.82rem; font-weight:700;
  transition:all 0.2s; display:flex; align-items:center; gap:6px;
}
.btn-primary   { background:var(--accent); color:#fff; }
.btn-primary:hover { background:var(--accent2); transform:translateY(-1px); }
.btn-success   { background:#16a34a; color:#fff; }
.btn-success:hover { background:#15803d; }
.btn-outline   { background:#fff; color:var(--accent); border:1.5px solid var(--accent); }
.btn-outline:hover { background:#fff7f0; }
.btn-dark      { background:var(--primary); color:#fff; }
.btn-dark:hover { background:#0f2440; }

/* WEEK SELECTOR */
.week-info {
  background: linear-gradient(135deg, #fff7f0, #fff);
  border:1.5px solid var(--border); border-radius:var(--radius);
  padding:12px 20px; margin:16px 20px;
  display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px;
}
.week-info .week-label { font-size:0.9rem; font-weight:800; color:var(--accent); }
.week-info .week-dates { font-size:0.78rem; color:var(--muted); }
.week-nav { display:flex; gap:8px; }
.week-nav-btn {
  background:var(--accent); color:#fff; border:none; border-radius:8px;
  padding:6px 14px; cursor:pointer; font-size:0.82rem; font-weight:700;
  font-family:'Cairo',sans-serif; transition:all 0.2s;
}
.week-nav-btn:hover { background:var(--accent2); }

/* STATS */
.stats-row {
  display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:12px; margin:0 20px 16px;
}
.stat-box {
  background:#fff; border:1px solid var(--border); border-radius:var(--radius);
  padding:14px 16px; text-align:center; box-shadow:var(--shadow);
}
.stat-box .stat-n { font-size:1.6rem; font-weight:900; }
.stat-box .stat-l { font-size:0.72rem; color:var(--muted); margin-top:2px; }
.stat-green .stat-n { color:var(--green); }
.stat-red   .stat-n { color:var(--red); }
.stat-yellow .stat-n{ color:var(--yellow); }
.stat-blue  .stat-n { color:var(--primary); }

/* TABLE */
.table-wrap {
  margin:0 20px 20px; border-radius:var(--radius);
  overflow:auto; box-shadow:var(--shadow);
  border:1px solid var(--border);
}
table { border-collapse:collapse; width:100%; min-width:900px; background:#fff; }
thead tr { background:linear-gradient(135deg, #1a3a5c, #c25a00); color:#fff; }
thead th {
  padding:12px 10px; font-size:0.78rem; font-weight:700;
  text-align:center; white-space:nowrap;
  border-left:1px solid rgba(255,255,255,0.15);
}
thead th:first-child { text-align:right; padding-right:16px; min-width:180px; }
thead th.day-col { min-width:90px; }

tbody tr { border-bottom:1px solid var(--border); transition:background 0.15s; }
tbody tr:hover { background:#fff7f0; }
tbody tr:last-child { border-bottom:none; }

.student-cell {
  padding:10px 16px 10px 10px;
  display:flex; align-items:center; gap:10px;
}
.student-num {
  background:var(--accent); color:#fff;
  width:22px; height:22px; border-radius:50%;
  font-size:0.68rem; font-weight:800;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.student-name { font-size:0.82rem; font-weight:700; }
.student-absent-count {
  font-size:0.68rem; color:var(--red); font-weight:700;
  background:#fee2e2; padding:1px 7px; border-radius:20px; margin-top:1px;
}

/* STATUS BUTTONS */
.status-cell { padding:8px; text-align:center; }
.status-btn {
  width:100%; padding:6px 4px; border-radius:8px; border:none;
  cursor:pointer; font-size:0.78rem; font-weight:700;
  font-family:'Cairo',sans-serif; transition:all 0.2s;
  min-width:70px;
}
.status-present { background:#dcfce7; color:#16a34a; }
.status-absent  { background:#fee2e2; color:#dc2626; }
.status-late    { background:#fef9c3; color:#b45309; }
.status-excuse  { background:#ede9fe; color:#7c3aed; }
.status-btn:hover { transform:scale(1.05); filter:brightness(0.95); }
.status-btn.active-present { background:#16a34a; color:#fff; }
.status-btn.active-absent  { background:#dc2626; color:#fff; }
.status-btn.active-late    { background:#d97706; color:#fff; }
.status-btn.active-excuse  { background:#7c3aed; color:#fff; }

/* DROPDOWN STATUS */
.status-select {
  width:100%; padding:6px 4px; border-radius:8px;
  border:1.5px solid var(--border); font-family:'Cairo',sans-serif;
  font-size:0.78rem; font-weight:700; cursor:pointer;
  outline:none; text-align:center;
}
.status-select.val-p { background:#dcfce7; color:#16a34a; border-color:#86efac; }
.status-select.val-a { background:#fee2e2; color:#dc2626; border-color:#fca5a5; }
.status-select.val-l { background:#fef9c3; color:#b45309; border-color:#fde047; }
.status-select.val-e { background:#ede9fe; color:#7c3aed; border-color:#c4b5fd; }
.status-select.val-h { background:#e0f2fe; color:#0369a1; border-color:#7dd3fc; }
.status-select.val-s { background:#f1f5f9; color:#475569; border-color:#cbd5e1; }
.status-select.val-n { background:#fdf4ff; color:#7e22ce; border-color:#d8b4fe; }

.note-cell { padding:8px 6px; }
.note-input {
  width:100%; padding:5px 8px; border-radius:6px;
  border:1px solid var(--border); font-family:'Cairo',sans-serif;
  font-size:0.75rem; resize:none; min-width:80px; max-width:140px;
}
.note-input:focus { border-color:var(--accent); outline:none; }

.total-cell {
  padding:8px; text-align:center;
  font-weight:800; font-size:0.85rem;
}

/* SIGNATURE SECTION */
.sign-section {
  background:#fff; border:1.5px solid var(--border);
  border-radius:var(--radius); margin:0 20px 20px;
  padding:20px; box-shadow:var(--shadow);
}
.sign-section h3 { font-size:0.95rem; font-weight:800; color:var(--primary); margin-bottom:16px; }
.sign-grid { display:grid; grid-template-columns:1fr; gap:20px; max-width:400px; }
.sign-box-wrap { display:flex; flex-direction:column; gap:8px; }
.sign-label { font-size:0.82rem; font-weight:700; color:var(--muted); }
.sign-name-input {
  border:1px solid var(--border); border-radius:8px;
  padding:8px 12px; font-family:'Cairo',sans-serif; font-size:0.84rem; width:100%;
}
.sign-canvas-wrap {
  border:2px dashed var(--border); border-radius:10px;
  height:100px; position:relative; overflow:hidden; background:#fafafa;
  cursor:crosshair;
}
.sign-canvas-wrap canvas { width:100%; height:100%; display:block; }
.sign-canvas-wrap .sign-placeholder {
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  color:var(--muted); font-size:0.8rem; pointer-events:none;
}
.sign-actions { display:flex; gap:8px; margin-top:4px; }
.btn-sm { padding:5px 12px; font-size:0.75rem; border-radius:8px; border:none; cursor:pointer; font-family:'Cairo',sans-serif; font-weight:700; transition:all 0.2s; }
.btn-sm-clear { background:#fee2e2; color:#dc2626; }
.btn-sm-clear:hover { background:#fca5a5; }

/* SAVE STATUS TOAST */
.toast {
  position:fixed; bottom:24px; right:24px; z-index:9999;
  background:var(--primary); color:#fff; padding:12px 20px;
  border-radius:12px; font-size:0.85rem; font-weight:700;
  box-shadow:0 8px 24px rgba(0,0,0,0.2);
  transform:translateY(80px); opacity:0;
  transition:all 0.3s; pointer-events:none;
}
.toast.show { transform:translateY(0); opacity:1; }

/* PDF PREVIEW */
.pdf-btn-row { display:flex; gap:10px; flex-wrap:wrap; margin:0 20px 20px; }

/* RESPONSIVE */
@media(max-width:768px) {
  .toolbar { padding:10px 12px; }
  .sign-grid { grid-template-columns:1fr; }
  .stats-row { grid-template-columns:repeat(2,1fr); }
  .week-info { margin:12px; }
  .table-wrap { margin:0 12px 16px; }
  .pdf-btn-row { margin:0 12px 16px; }
  .sign-section { margin:0 12px 16px; }
}

/* ===== HIJRI CALENDAR TOGGLE ===== */
.date-picker-wrap {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.cal-toggle-row {
  display: flex;
  gap: 4px;
  justify-content: center;
}
.cal-toggle-btn {
  flex: 1;
  padding: 3px 8px;
  border-radius: 6px;
  border: 1.5px solid #d1d5db;
  font-family: 'Cairo', sans-serif;
  font-size: 0.68rem;
  font-weight: 700;
  cursor: pointer;
  background: #f9fafb;
  color: #6b7280;
  transition: all 0.15s;
}
.cal-toggle-btn.active {
  background: var(--primary, #7a2800);
  color: #fff;
  border-color: var(--primary, #7a2800);
}

/* Hijri popup */
.hijri-popup {
  display: none;
  position: fixed;
  z-index: 9999;
  background: #fff;
  border-radius: 14px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  padding: 18px 20px;
  min-width: 280px;
  border: 1px solid #e5e7eb;
  animation: popIn 0.18s ease;
}
@keyframes popIn {
  from { opacity:0; transform:translateY(-8px) scale(0.97); }
  to   { opacity:1; transform:none; }
}
.hijri-popup.open { display: block; }
.hijri-popup-title {
  font-weight: 800;
  font-size: 0.88rem;
  color: var(--primary, #7a2800);
  margin-bottom: 12px;
  text-align: center;
}
.hijri-inputs {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  align-items: center;
}
.hijri-field {
  display: flex;
  flex-direction: column;
  gap: 3px;
  flex: 1;
}
.hijri-field label {
  font-size: 0.65rem;
  font-weight: 700;
  color: #6b7280;
}
.hijri-field input, .hijri-field select {
  padding: 7px 8px;
  border: 1.5px solid #d1d5db;
  border-radius: 8px;
  font-family: 'Cairo', sans-serif;
  font-size: 0.82rem;
  font-weight: 700;
  text-align: center;
  outline: none;
  width: 100%;
}
.hijri-field input:focus, .hijri-field select:focus {
  border-color: var(--primary, #7a2800);
}
.hijri-popup-btns {
  display: flex;
  gap: 8px;
}
.hijri-popup-btns button {
  flex: 1;
  padding: 8px;
  border-radius: 9px;
  border: none;
  font-family: 'Cairo', sans-serif;
  font-size: 0.78rem;
  font-weight: 800;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-hijri-apply {
  background: var(--primary, #7a2800);
  color: #fff;
}
.btn-hijri-cancel {
  background: #f3f4f6;
  color: #374151;
}
.hijri-display {
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--accent, #e07020);
  text-align: center;
  min-height: 16px;
  margin-top: 2px;
}
.hijri-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 9998;
}
.hijri-overlay.open { display: block; }


/* حقل هجري مدمج */
.hijri-inline {
  display: flex;
  gap: 4px;
  align-items: center;
}
.hijri-sel {
  border: 1.5px solid #d1d5db;
  border-radius: 8px;
  font-family: 'Cairo', sans-serif;
  font-size: 0.78rem;
  font-weight: 700;
  color: #374151;
  background: #fff;
  outline: none;
  padding: 5px 6px;
  cursor: pointer;
  transition: border-color 0.15s;
}
.hijri-sel:focus { border-color: var(--primary, #7a2800); }
#hDay   { width: 60px; text-align: center; }
#hMonth { width: 110px; }
#hYear  { width: 72px; text-align: center; -moz-appearance: textfield; }
#hYear::-webkit-outer-spin-button,
#hYear::-webkit-inner-spin-button { -webkit-appearance: none; }
.cal-field-wrap { display: flex; align-items: center; }


.day-bulk-row td {
  padding: 4px 6px;
  background: #f8f4f0;
  border-bottom: 2px solid #e8d8cc;
}
.day-bulk-select {
  width: 100%;
  padding: 5px 4px;
  border: 1.5px solid #e8d8cc;
  border-radius: 8px;
  font-family: 'Cairo', sans-serif;
  font-size: 0.72rem;
  font-weight: 800;
  cursor: pointer;
  background: #fff;
  color: #c25a00;
  outline: none;
  transition: border-color 0.15s;
}
.day-bulk-select:hover { border-color: #c25a00; }
.day-bulk-select:focus { border-color: #c25a00; box-shadow: 0 0 0 2px rgba(194,90,0,0.12); }

</style>
</head>
<body>

<!-- HEADER -->
<div class="page-header">
  <div>
    <h1>🧠 كشف حضور — برنامج الدمج الفكري</h1>
    <p>مدرسة مكة المكرمة المتوسطة — قسم ذوي الإعاقة</p>
  </div>
  <a href="dumaj-students.html" class="back-btn">← العودة</a>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="toolbar-group">
    <label>📅 الأسبوع:</label>
    <div class="date-picker-wrap">
        <!-- حقل ميلادي -->
        <div class="cal-field-wrap" id="miladiWrap">
          <input type="date" id="weekStart" onchange="setWeekFromDate(this.value)">
        </div>
        <!-- حقل هجري بنفس شكل الميلادي -->
        <div class="cal-field-wrap hijri-wrap" id="hijriWrap" style="display:none;">
          <div class="hijri-inline">
            <select class="hijri-sel" id="hDay" onchange="applyHijriInline()">
              <option value="">يوم</option>
            </select>
            <select class="hijri-sel" id="hMonth" onchange="applyHijriInline()">
              <option value="">شهر</option>
              <option value="1">محرم</option><option value="2">صفر</option>
              <option value="3">ربيع الأول</option><option value="4">ربيع الثاني</option>
              <option value="5">جمادى الأولى</option><option value="6">جمادى الثانية</option>
              <option value="7">رجب</option><option value="8">شعبان</option>
              <option value="9">رمضان</option><option value="10">شوال</option>
              <option value="11">ذو القعدة</option><option value="12">ذو الحجة</option>
            </select>
            <input class="hijri-sel" id="hYear" type="number" min="1400" max="1500"
              placeholder="السنة" oninput="applyHijriInline()">
          </div>
        </div>
        <!-- زرا التبديل -->
        <div class="cal-toggle-row">
          <button class="cal-toggle-btn active" data-mode="miladi" onclick="setCalMode('miladi')">📅 ميلادي</button>
          <button class="cal-toggle-btn" data-mode="hijri" onclick="setCalMode('hijri')">🌙 هجري</button>
        </div>
        <div class="hijri-display" id="hijriDisplay"></div>
      </div>
  </div>
  <div class="toolbar-group">
    <label>📚 الفصل:</label>
    <select id="semesterSelect">
      <option value="الفصل الأول 1447">الفصل الأول 1447</option>
      <option value="الفصل الثاني 1447" selected>الفصل الثاني 1447</option>
    </select>
  </div>
  <div class="toolbar-group" style="margin-right:auto;">
    <button class="btn btn-success" onclick="saveAttendance()">💾 حفظ في السحابة</button>
    <button class="btn btn-dark" onclick="printAttendance()">🖨️ طباعة</button>
    <button class="btn btn-outline" onclick="markAllPresent()">✅ تحضير الكل</button>
  </div>
</div>

<!-- WEEK INFO -->
<div class="week-info">
  <div>
    <div class="week-label" id="weekLabel">الأسبوع الحالي</div>
    <div class="week-dates" id="weekDates">—</div>
  </div>
  <div class="week-nav">
    <button class="week-nav-btn" onclick="changeWeek(-1)">→ الأسبوع السابق</button>
    <button class="week-nav-btn" onclick="changeWeek(1)">← الأسبوع التالي</button>
  </div>
</div>

<!-- STATS -->
<div class="stats-row" id="statsRow">
  <div class="stat-box stat-green"><div class="stat-n" id="statP">0</div><div class="stat-l">✅ حاضر</div></div>
  <div class="stat-box stat-red">  <div class="stat-n" id="statA">0</div><div class="stat-l">❌ غائب</div></div>
  <div class="stat-box stat-yellow"><div class="stat-n" id="statL">0</div><div class="stat-l">⏰ متأخر</div></div>
  <div class="stat-box">            <div class="stat-n" id="statE">0</div><div class="stat-l">📋 بعذر</div></div>
  <div class="stat-box stat-blue">  <div class="stat-n" id="statPct">0%</div><div class="stat-l">نسبة الحضور</div></div>
</div>

<!-- TABLE -->
<div class="table-wrap">
  <table id="attendanceTable">
    <thead>
      <tr>
        <th>#</th>
        <th style="text-align:right">اسم الطالب</th>
        <th class="day-col">الأحد</th>
        <th class="day-col">الاثنين</th>
        <th class="day-col">الثلاثاء</th>
        <th class="day-col">الأربعاء</th>
        <th class="day-col">الخميس</th>
        <th>ملاحظات</th>
        <th>غياب</th>
      </tr>
      <tr class="day-bulk-row" id="day-bulk-row">
        <td colspan="2" style="text-align:center;font-size:0.72rem;font-weight:800;color:#c25a00;">
          تحكم يومي ↓
        </td>
        <td id="bulk-td-0"></td>
        <td id="bulk-td-1"></td>
        <td id="bulk-td-2"></td>
        <td id="bulk-td-3"></td>
        <td id="bulk-td-4"></td>
        <td colspan="2"></td>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<!-- SIGNATURE SECTION -->
<div class="sign-section">
  <h3>✍️ التوقيعات</h3>
  <div class="sign-grid">
    <div class="sign-box-wrap">
      <div class="sign-label">توقيع المعلم</div>
      <input class="sign-name-input" id="teacherName" placeholder="اسم المعلم">
      <div class="sign-canvas-wrap" id="teacherWrap">
        <canvas id="teacherCanvas"></canvas>
        <div class="sign-placeholder" id="tchPlaceholder">✍️ وقّع هنا</div>
      </div>
      <div class="sign-actions">
        <button class="btn-sm btn-sm-clear" onclick="clearSign('teacherCanvas','tchPlaceholder')">مسح التوقيع</button>
      </div>
    </div>
  </div>
</div>

<!-- BUTTONS -->
<div class="pdf-btn-row">
  <button class="btn btn-success" onclick="saveAttendance()">💾 حفظ في السحابة</button>
  <button class="btn btn-dark" onclick="printAttendance()">🖨️ طباعة / تصدير PDF</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== CONFIG =====

let currentWeekStart = getThisSunday();

// ===== WEEK UTILS =====
function getThisSunday() {
  const d = new Date();
  const day = d.getDay(); // 0=Sun
  d.setDate(d.getDate() - day);
  d.setHours(0,0,0,0);
  return d;
}
function weekKey(d) {
  return d.toISOString().slice(0,10);
}
function formatDate(d) {
  return d.toLocaleDateString('ar-SA-u-nu-latn', {day:'numeric',month:'numeric'});
}
function setWeekFromDate(val) {
  const d = new Date(val);
  const day = d.getDay();
  d.setDate(d.getDate() - day);
  d.setHours(0,0,0,0);
  currentWeekStart = d;
  renderAll();
}
function changeWeek(dir) {
  currentWeekStart.setDate(currentWeekStart.getDate() + dir * 7);
  renderAll();
}
function getWeekDays() {
  return DAYS.map((name, i) => {
    const d = new Date(currentWeekStart);
    d.setDate(d.getDate() + i);
    return {name, date: d, dateStr: formatDate(d)};
  });
}

function onStatusChange(sel) {
  const pin = sel.dataset.pin;
  const day = sel.dataset.day;
  const val = sel.value;
  const wk  = weekKey(currentWeekStart);

  if (!attendanceData[wk]) attendanceData[wk] = {};
  if (!attendanceData[wk][pin]) attendanceData[wk][pin] = {};
  attendanceData[wk][pin][`d${day}`] = val;

  // تحديث لون الـ select
  sel.className = `status-select val-${val}`;

  updateStats();
  // تحديث عداد الغياب للطالب
  document.getElementById(`abs-${pin}`).textContent = getDayAbsences(pin, wk);

  // تحديث عداد الغياب الكلي
  const row = sel.closest('tr');
  const absDiv = row.querySelector('.student-absent-count');
  const total = countAbsences(pin);
  if (total > 0) {
    if (absDiv) absDiv.textContent = `غياب: ${total} يوم`;
    else row.querySelector('.student-name').insertAdjacentHTML('afterend',
      `<div class="student-absent-count">غياب: ${total} يوم</div>`);
  } else {
    absDiv?.remove();
  }
}

function onNoteChange(inp) {
  const pin = inp.dataset.pin;
  const wk  = weekKey(currentWeekStart);
  if (!attendanceData[wk]) attendanceData[wk] = {};
  if (!attendanceData[wk][pin]) attendanceData[wk][pin] = {};
  attendanceData[wk][pin].note = inp.value;
}

function getDayAbsences(pin, wk) {
  const rec = attendanceData[wk]?.[pin] || {};
  return DAYS.filter((_, i) => rec[`d${i}`] === 'a').length;
}

function countAbsences(pin) {
  let total = 0;
  for (const wk of Object.keys(attendanceData)) {
    total += getDayAbsences(pin, wk);
  }
  return total;
}

function updateStats() {
  const wk = weekKey(currentWeekStart);
  let p=0, a=0, l=0, e=0, total=0;
  STUDENTS.forEach(stu => {
    const rec = attendanceData[wk]?.[stu.pin] || {};
    DAYS.forEach((_, di) => {
      const v = rec[`d${di}`] || 'p';
      if (v==='n') return; // انتساب لا يُحسب
      total++;
      if (v==='p') p++;
      else if (v==='a') a++;
      else if (v==='l') l++;
      else if (v==='e' || v==='h' || v==='s') e++;
    });
  });
  document.getElementById('statP').textContent = p;
  document.getElementById('statA').textContent = a;
  document.getElementById('statL').textContent = l;
  document.getElementById('statE').textContent = e;
  document.getElementById('statPct').textContent = total ? Math.round((p+l)/total*100)+'%' : '0%';
}

function markAllPresent() {
  const wk = weekKey(currentWeekStart);
  if (!attendanceData[wk]) attendanceData[wk] = {};
  STUDENTS.forEach(stu => {
    if (!attendanceData[wk][stu.pin]) attendanceData[wk][stu.pin] = {};
    DAYS.forEach((_, di) => { attendanceData[wk][stu.pin][`d${di}`] = 'p'; });
  });
  renderTable();
  updateStats();
  showToast('✅ تم تحضير جميع الطلاب');
}

// ===== SIGNATURE =====
const canvases = {};

function initCanvas(id, wrapperId, placeholderId) {
  const wrap = document.getElementById(wrapperId);
  const canvas = document.getElementById(id);
  const ph = document.getElementById(placeholderId);
  canvas.width  = wrap.offsetWidth  || 400;
  canvas.height = wrap.offsetHeight || 100;
  const ctx = canvas.getContext('2d');
  ctx.strokeStyle = '#1a3a5c';
  ctx.lineWidth   = 2.5;
  ctx.lineCap     = 'round';
  canvases[id]    = {ctx, drawing:false, hasContent:false};

  function getPos(e) {
    const r = canvas.getBoundingClientRect();
    const src = e.touches?.[0] || e;
    return {x:(src.clientX-r.left)*(canvas.width/r.width), y:(src.clientY-r.top)*(canvas.height/r.height)};
  }
  function start(e) { e.preventDefault(); const p=getPos(e); canvases[id].drawing=true; ctx.beginPath(); ctx.moveTo(p.x,p.y); ph.style.display='none'; }
  function move(e)  { e.preventDefault(); if(!canvases[id].drawing) return; const p=getPos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); canvases[id].hasContent=true; }
  function end()    { canvases[id].drawing=false; }

  canvas.addEventListener('mousedown', start);
  canvas.addEventListener('mousemove', move);
  canvas.addEventListener('mouseup',   end);
  canvas.addEventListener('touchstart', start, {passive:false});
  canvas.addEventListener('touchmove',  move,  {passive:false});
  canvas.addEventListener('touchend',   end);
}

function clearSign(id, phId) {
  const {ctx} = canvases[id];
  const canvas = document.getElementById(id);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  canvases[id].hasContent = false;
  document.getElementById(phId).style.display='flex';
}

// ===== SAVE / LOAD =====
async function saveAttendance() {
  showToast('⏳ جاري الحفظ...');
  const wk   = weekKey(currentWeekStart);
  const sem  = document.getElementById('semesterSelect').value;

  const teacherSign = canvases['teacherCanvas']?.hasContent
    ? document.getElementById('teacherCanvas').toDataURL() : null;

  const payload = {
    week:       wk,
    semester:   sem,
    program:    PROGRAM,
    data:       attendanceData[wk] || {},
    teacher:    document.getElementById('teacherName').value,
    teacherSign,
    savedAt:    new Date().toISOString(),
  };

  const blob    = new Blob([JSON.stringify(payload)], {type:'application/json'});
  const path    = `${SB_URL}/storage/v1/object/reports/${PROGRAM}/attendance/attendance-${wk}.json`;
  const headers = {'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};

  try {
    // حاول PUT (تحديث ملف موجود)
    let res = await fetch(path, {method:'PUT', headers, body: blob});

    // إن فشل PUT جرّب POST (إنشاء ملف جديد)
    if (!res.ok) {
      res = await fetch(path, {method:'POST', headers:{...headers,'x-upsert':'true'}, body: blob});
    }

    if (res.ok) {
      showToast('✅ تم الحفظ بنجاح');
    } else {
      const err = await res.text();
      showToast('❌ فشل الحفظ: ' + err.slice(0,80));
      console.error('Save error:', err);
    }
  } catch(e) {
    showToast('❌ تعذّر الاتصال بالخادم');
    console.error(e);
  }
}

async function loadAttendance(wk) {
  try {
    const res = await fetch(
      `${SB_URL}/storage/v1/object/reports/${PROGRAM}/attendance/attendance-${wk}.json`,
      { headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY } }
    );
    // 400/404 = الملف غير موجود بعد — ابدأ بكشف فارغ
    if (!res.ok) { renderTable(); updateStats(); return; }
    const payload = await res.json();
    if (payload.data) {
      attendanceData[wk] = payload.data;
      // استعادة أسماء الموقّعين
      // supervisor removed
      if (payload.teacher)    document.getElementById('teacherName').value    = payload.teacher;
    }
    renderTable();
    updateStats();
  } catch(e) {}
}

// ===== HIJRI CALENDAR =====
let _calMode = 'miladi';

function getHijriParts(d) {
  try {
    const s = d.toLocaleDateString('en-SA-u-ca-islamic-umalqura',
      {day:'numeric', month:'numeric', year:'numeric'});
    const p = s.split('/'); // M/D/Y
    return {m: parseInt(p[0]), d: parseInt(p[1]), y: parseInt(p[2])};
  } catch(e) { return {m:9, d:1, y:1447}; }
}

function getHijriLabel(d) {
  try {
    return '🌙 ' + d.toLocaleDateString('ar-SA-u-ca-islamic-umalqura-nu-latn',
      {day:'numeric', month:'long', year:'numeric'});
  } catch(e) { return ''; }
}

function fillHijriDays(month, year, selectedDay) {
  const sel = document.getElementById('hDay');
  if (!sel) return;
  // أقصى أيام الشهر الهجري 29 أو 30
  const maxDay = 30;
  const cur = selectedDay || parseInt(sel.value) || 1;
  sel.innerHTML = '<option value="">يوم</option>' +
    Array.from({length: maxDay}, (_, i) => i+1)
      .map(d => `<option value="${d}" ${d===cur?'selected':''}>${d}</option>`)
      .join('');
}

function setCalMode(mode) {
  _calMode = mode;
  document.querySelectorAll('.cal-toggle-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.mode === mode));

  const miladiWrap = document.getElementById('miladiWrap');
  const hijriWrap  = document.getElementById('hijriWrap');

  if (mode === 'miladi') {
    miladiWrap.style.display = '';
    hijriWrap.style.display  = 'none';
  } else {
    miladiWrap.style.display = 'none';
    hijriWrap.style.display  = '';
    // ملء القيم الحالية
    const p = getHijriParts(currentWeekStart);
    document.getElementById('hMonth').value = p.m;
    document.getElementById('hYear').value  = p.y;
    fillHijriDays(p.m, p.y, p.d);
  }
  updateHijriDisplay();
}

function applyHijriInline() {
  const d = parseInt(document.getElementById('hDay').value);
  const m = parseInt(document.getElementById('hMonth').value);
  const y = parseInt(document.getElementById('hYear').value);
  if (!d || !m || !y || y < 1400 || y > 1500) return;

  const miladi = hijriToMiladi(y, m, d);
  if (!miladi) return;

  // اضبط على الأحد
  miladi.setHours(0,0,0,0);
  miladi.setDate(miladi.getDate() - miladi.getDay());
  currentWeekStart = miladi;
  document.getElementById('weekStart').value = weekKey(currentWeekStart);
  renderAll();
}

function updateHijriDisplay() {
  const el = document.getElementById('hijriDisplay');
  if (el) el.textContent = getHijriLabel(currentWeekStart);
}

function hijriToMiladi(hy, hm, hd) {
  const approxJD = Math.floor((11*hy+3)/30) + 354*hy + 30*hm
    - Math.floor((hm-1)/2) + hd + 1948440 - 385;
  const approx = julianToDate(approxJD);
  for (let offset = -45; offset <= 45; offset++) {
    const test = new Date(approx);
    test.setDate(test.getDate() + offset);
    try {
      const p = test.toLocaleDateString('en-SA-u-ca-islamic-umalqura',
        {day:'numeric', month:'numeric', year:'numeric'}).split('/');
      if (parseInt(p[2])===hy && parseInt(p[0])===hm && parseInt(p[1])===hd)
        return test;
    } catch(e) {}
  }
  return approx;
}

function julianToDate(jd) {
  let l=jd+68569, n=Math.floor(4*l/146097);
  l=l-Math.floor((146097*n+3)/4);
  const i=Math.floor(4000*(l+1)/1461001);
  l=l-Math.floor(1461*i/4)+31;
  const j=Math.floor(80*l/2447), d=l-Math.floor(2447*j/80);
  l=Math.floor(j/11);
  return new Date(100*(n-49)+i+l, j+2-12*l-1, d);
}


// ===== تحكم يومي =====
const BULK_OPTS = [
  {val:'p', label:'✅ حاضر الكل'},
  {val:'a', label:'❌ غائب الكل'},
  {val:'h', label:'🏖️ إجازة الكل'},
  {val:'s', label:'🚫 تعليق الكل'},
];

function renderBulkRow() {
  for (let di = 0; di < 5; di++) {
    const td = document.getElementById('bulk-td-' + di);
    if (!td) continue;
    const opts = [
      `<option value="" disabled selected>— تطبيق على الكل —</option>`,
      ...BULK_OPTS.map(o => `<option value="${o.val}">${o.label}</option>`)
    ].join('');
    td.innerHTML = `<select class="day-bulk-select" onchange="markDay(${di},this.value);this.selectedIndex=0;">${opts}</select>`;
  }
}

function markDay(di, val) {
  const wk = weekKey(currentWeekStart);
  if (!attendanceData[wk]) attendanceData[wk] = {};
  STUDENTS.forEach(stu => {
    if (!attendanceData[wk][stu.pin]) attendanceData[wk][stu.pin] = {};
    attendanceData[wk][stu.pin][`d${di}`] = val;
  });
  renderTable();
  updateStats();
  const dayNames = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس'];
  const labels = {p:'حاضر',a:'غائب',h:'إجازة',s:'تعليق'};
  showToast(`✅ ${dayNames[di]}: تم تسجيل ${labels[val]||val} لجميع الطلاب`);
}
